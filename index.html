<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Magic School Portal (Online)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #3b3529; font-family: 'Kanit', sans-serif; color: #6d5b4b; }
        .card { background: #f3ebeb; border-radius: 24px; box-shadow: 0 4px 15px rgba(109, 91, 75, 0.1); }
        .btn-active { background-color: #d1bfae !important; color: white !important; }
        .btn-inactive { border: 2px solid #f5eee8; color: #7a4e27; }
        .sub-btn-active { background-color: #8e7a68 !important; color: white !important; }
        table { border-collapse: separate; border-spacing: 0 10px; width: 100%; }
        th { color: #705f50; padding: 10px; border-bottom: 2px solid #efeae6; }
        td { padding: 12px; background: #eeeae6; color: #221b15; }
        .first-col { border-radius: 12px 0 0 12px; font-weight: bold; }
        .last-col { border-radius: 0 12px 12px 0; }
        .page { display: none; }
        .active-page { display: block; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAWfL9dyR1xM7PKZX3pUKR8balroSAZGk",
            authDomain: "rnak-63e43.firebaseapp.com",
            databaseURL: "https://rnak-63e43-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rnak-63e43",
            storageBucket: "rnak-63e43.firebasestorage.app",
            messagingSenderId: "131670077086",
            appId: "1:131670077086:web:74e623d876c3309d14958f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'magicData');

        window.dbRef = dataRef;
        window.removeData = remove;
        window.pushData = push;
        window.onValue = onValue;
        window.ref = ref;
        window.db = db;
    </script>
</head>
<body class="p-4 md:p-10">

<div class="max-w-4xl mx-auto card p-8">
    <h1 class="text-3xl font-bold text-center text-[#8e7a68] mb-8">Magic School Portal</h1>

    <div class="flex justify-center gap-4 mb-8">
        <button id="btnPage1" onclick="showPage('page1')" class="px-6 py-2 rounded-full btn-active font-semibold">🔍 ค้นหาข้อมูล</button>
        <button id="btnPage2" onclick="showPage('page2')" class="px-6 py-2 rounded-full btn-inactive font-semibold">➕ จัดการข้อมูล</button>
    </div>

    <div id="page1" class="page active-page">
        <input type="text" id="searchInput" onkeyup="updateDisplay()" placeholder="ค้นหาชื่อหรืออันดับ..." class="w-full p-4 mb-6 rounded-xl border-2 border-[#efeae6] outline-none">
        <div id="tabContainer" class="flex flex-wrap justify-center gap-2 mb-8"></div>
        <table>
            <thead><tr><th>อันดับ</th><th class="text-left">ชื่อนักเรียน</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="page2" class="page">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <select id="sub" class="p-4 rounded-xl border-2 border-[#efeae6] bg-white"><option>วิชาป้องกันตัวจากศาสตร์มืด</option><option>วิชาศิลปะชนชั้นสูง</option><option>วิชาปรุงยาและสมุนไพร</option><option>วิชาคาถาและเวทย์มนต์</option><option>วิชาการศึกษาและดูแลสัตว์วิเศษ</option></select>
            <input type="text" id="name" placeholder="ชื่อนักเรียน" class="p-4 rounded-xl border-2 border-[#efeae6]">
            <input type="number" id="rank" placeholder="อันดับ" class="p-4 rounded-xl border-2 border-[#efeae6]">
        </div>
        <button onclick="addData()" class="w-full bg-[#d1bfae] text-white p-4 rounded-xl font-bold mb-8">บันทึกข้อมูล</button>
        <div class="max-h-60 overflow-y-auto">
            <table>
                <thead><tr><th>อันดับ</th><th class="text-left">ชื่อ</th><th>ลบ</th></tr></thead>
                <tbody id="manageTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let activeSub = '';

    // เริ่มต้นเชื่อมต่อ Firebase
    window.onload = () => {
        renderTabs();
        window.onValue(window.dbRef, (snapshot) => {
            const data = snapshot.val();
            allData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            updateDisplay();
        });
    };

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
    }

    function addData() {
        const sub = document.getElementById('sub').value, name = document.getElementById('name').value, rank = document.getElementById('rank').value;
        if(name && rank) {
            window.pushData(window.dbRef, { sub, name, rank: parseInt(rank) });
            alert("บันทึกข้อมูลออนไลน์แล้ว!");
        }
    }

    function deleteItem(id) {
        if(confirm('ยืนยันการลบ?')) window.removeData(window.ref(window.db, 'magicData/' + id));
    }

    function renderTabs() {
        const subjects = ["วิชาป้องกันตัวจากศาสตร์มืด", "วิชาศิลปะชนชั้นสูง", "วิชาปรุงยาและสมุนไพร", "วิชาคาถาและเวทย์มนต์", "วิชาการศึกษาและดูแลสัตว์วิเศษ"];
        document.getElementById('tabContainer').innerHTML = subjects.map(sub => 
            `<button id="btn-${sub.replace(/\s+/g, '')}" onclick="setActiveSubject('${sub}')" class="px-5 py-2 bg-white border-2 border-[#efeae6] rounded-full text-sm text-[#8e7a68] hover:bg-[#efeae6] transition">${sub}</button>`
        ).join('');
    }

    function setActiveSubject(sub) {
        activeSub = sub;
        document.querySelectorAll('#tabContainer button').forEach(btn => btn.className = "px-5 py-2 bg-white border-2 border-[#efeae6] rounded-full text-sm text-[#8e7a68] hover:bg-[#efeae6] transition");
        document.getElementById(`btn-${sub.replace(/\s+/g, '')}`).className = "px-5 py-2 sub-btn-active rounded-full text-sm transition";
        updateDisplay();
    }

    function updateDisplay() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => (activeSub ? item.sub === activeSub : true) && (item.name.toLowerCase().includes(query) || item.rank.toString().includes(query)));
        filtered.sort((a,b) => a.rank - b.rank);
        
        document.getElementById('tableBody').innerHTML = filtered.map(item => `<tr><td class="first-col text-center">${item.rank}</td><td class="last-col text-left">${item.name}</td></tr>`).join('');
        document.getElementById('manageTableBody').innerHTML = allData.map(item => `<tr><td class="first-col text-center">${item.rank}</td><td>${item.name}</td><td class="last-col text-center"><button onclick="deleteItem('${item.id}')" class="text-red-500">🗑️</button></td></tr>`).join('');
    }
</script>
</body>
</html>
